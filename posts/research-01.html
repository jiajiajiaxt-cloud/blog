            <h1>机器学习基础概念</h1>

            <h2>什么是机器学习</h2>
            <p>机器学习是人工智能的一个分支，它使计算机系统能够从数据中学习并改进，而无需显式编程。</p>

            <h2>主要类型</h2>
            <h3>监督学习</h3>
            <p>使用标记数据进行训练，例如分类和回归。</p>

            <h3>无监督学习</h3>
            <p>使用未标记数据发现隐藏模式，例如聚类。</p>

            <h3>强化学习</h3>
            <p>通过与环境交互学习最优策略。</p>

            <h2>常用算法</h2>
            <ul>
                <li>线性回归</li>
                <li>逻辑回归</li>
                <li>决策树</li>
                <li>神经网络</li>
                <li>支持向量机</li>
            </ul>
